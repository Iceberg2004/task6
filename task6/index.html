<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Get in Touch</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <p class="eyebrow">Contact</p>
  <h1>Send us a note</h1>
  <p class="sub">Fill in the fields below. We reply within two business days.</p>

  <form id="contactForm" novalidate>
    <div class="field">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" autocomplete="name" placeholder="Jordan Rivera">
      <div class="msg" id="nameMsg"></div>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input type="text" id="email" name="email" autocomplete="email" placeholder="jordan@example.com">
      <div class="msg" id="emailMsg"></div>
    </div>

    <div class="field">
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="What would you like to tell us?"></textarea>
      <div class="char-count" id="charCount">0 / 500</div>
      <div class="msg" id="messageMsg"></div>
    </div>

    <button type="submit">Send message</button>

    <div id="formStatus"></div>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
